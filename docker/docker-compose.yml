services:
  s3-file-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: s3-file-manager
    mem_limit: 512m
    cpus: 0.5
    networks:
      - s3fm-network
    volumes:
      - ../app/data:/app/data
    environment:
      - S3FM_PORT=8000
      - S3FM_DB_URL=${S3FM_DB_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - s3-file-manager
    networks:
      - s3fm-network
      
networks:
  s3fm-network:
    driver: bridge
 
